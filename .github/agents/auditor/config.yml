# auditor agent — repo-specific configuration
# Scaffolded from auditor@v0.2.0 defaults.yml via .moirai/bin/install.
# Validated against .agents/auditor/schema.json.
# Any field omitted here falls back to .agents/auditor/defaults.yml.

max_findings_per_audit: 8
neighbor_set_cap: 30
max_prs_per_run: 20

inbox_path: notes/inbox.md

categories:
  link_integrity: true
  orphans: true
  ia_drift: true
  copy_drift: true
  metadata: true
  component_drift: true

scan_paths:
  - content/
  - app/
  - components/
  - lib/
  - public/
  - docs/

skip_paths:
  - node_modules/
  - .next/
  - pnpm-lock.yaml
  - notes/inbox.md
