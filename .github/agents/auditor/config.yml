# auditor agent — repo-specific configuration
# Scaffolded from auditor@v0.3.0 defaults.yml via .moirai/bin/install.
# Validated against .agents/auditor/schema.json.
# Any field omitted here falls back to .agents/auditor/defaults.yml.

max_findings_per_pr: 8
neighbor_set_cap: 30
max_prs_per_run: 20
dedup_window_days: 30

categories:
  link_integrity: true
  orphans: true
  ia_drift: true
  copy_drift: true
  metadata: true
  component_drift: true

scan_paths:
  - content/
  - app/
  - components/
  - lib/
  - public/
  - docs/

skip_paths:
  - node_modules/
  - .next/
  - pnpm-lock.yaml

labels:
  base:
    - auditor
    - cleanup
  per_category:
    link_integrity:  auditor:link-integrity
    orphans:         auditor:orphans
    ia_drift:        auditor:ia-drift
    copy_drift:      auditor:copy-drift
    metadata:        auditor:metadata
    component_drift: auditor:component-drift
