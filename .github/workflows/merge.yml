name: Merge

on:
  schedule:
    - cron: '*/30 * * * *'  # every 30 minutes
  workflow_dispatch:
    inputs:
      merge_test_mode:
        description: 'Bypass 24h review window (testing only)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  merge-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git identity
        run: |
          git config --global user.email "merge@autonomous.agent"
          git config --global user.name "Merge Agent"

      - name: Run merge check
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_STRATEGY: ${{ vars.MERGE_STRATEGY }}
          MERGE_TEST_MODE: ${{ github.event.inputs.merge_test_mode || 'false' }}
        run: bash merge/scripts/run-merge-check.sh
